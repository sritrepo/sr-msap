# netlify.toml
# Place this file in the ROOT of your project folder alongside index.html

[build]
  publish = "."
  functions = "netlify/functions"

# Function endpoint: no caching
[[headers]]
  for = "/.netlify/functions/submit"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# Clean URL redirect (optional)
[[redirects]]
  from   = "/apply"
  to     = "/index.html"
  status = 200

# Security Headers
#
# IMPORTANT re: iframe embedding
# X-Frame-Options is intentionally NOT set.
# Setting SAMEORIGIN or DENY here would block the Webflow iframe embed.
# We use CSP frame-ancestors instead (modern standard, per-domain control).
#
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

    # frame-ancestors whitelists which pages can embed this site in an iframe.
    # Allowed:
    #   self                  = direct browser access
    #   spherejobs.webflow.io = your Webflow staging/editor domain
    #   *.webflow.io          = Webflow preview subdomains
    #   spherejobs.ph         = your live custom domain
    #   *.spherejobs.ph       = subdomains (www, careers, apply, etc.)
    #
    # Add more space-separated origins if you embed on other domains.
    # Do NOT add X-Frame-Options anywhere — it overrides this and breaks embedding.
    Content-Security-Policy = "frame-ancestors 'self' https://spherejobs.webflow.io https://*.webflow.io https://spherejobs.ph https://*.spherejobs.ph"
